# .github/workflows/ci.yml
name: Moodiy Registration CI

on:
  push:
    branches: [main, master, ci/cd]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 0 * * 0" # Weekly run to catch issues with new Moodle versions

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ["7.4", "8.0", "8.1"]
        moodle-branch:
          [
            "MOODLE_311_STABLE",
            "MOODLE_400_STABLE",
            "MOODLE_401_STABLE",
            "MOODLE_402_STABLE",
          ]
        database: ["pgsql", "mariadb"]
        exclude:
          # Exclude combinations that aren't supported
          - php: "8.1"
            moodle-branch: "MOODLE_311_STABLE"

    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: "postgres"
          POSTGRES_HOST_AUTH_METHOD: "trust"
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 3

      mariadb:
        image: mariadb:10.6
        env:
          MYSQL_USER: "root"
          MYSQL_ALLOW_EMPTY_PASSWORD: "true"
          MYSQL_CHARACTER_SET_SERVER: "utf8mb4"
          MYSQL_COLLATION_SERVER: "utf8mb4_unicode_ci"
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval 10s --health-timeout 5s --health-retries 3

    steps:
      - name: Checkout plugin
        uses: actions/checkout@v3
        with:
          path: admin/tool/moodiyregistration

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pgsql, mysqli, zip, gd, xmlrpc, soap
          ini-values: max_input_vars=5000
          coverage: none

      - name: Deploy moodle-plugin-ci
        run: |
          composer create-project -n --no-dev --prefer-dist moodlehq/moodle-plugin-ci ci ^3
          echo $(cd ci/bin; pwd) >> $GITHUB_PATH

      - name: Checkout Moodle
        run: moodle-plugin-ci install --plugin ./admin/tool/moodiyregistration --db-host=127.0.0.1 --db-user=root --db-pass="" --db-name=moodle --db-type=${{ matrix.database }} --moodle-branch=${{ matrix.moodle-branch }}
        env:
          DB: ${{ matrix.database }}
          MOODLE_BRANCH: ${{ matrix.moodle-branch }}

      - name: PHP Lint
        run: moodle-plugin-ci phplint

      - name: PHP Copy/Paste Detector
        run: moodle-plugin-ci phpcpd

      - name: PHP Mess Detector
        run: moodle-plugin-ci phpmd

      - name: Moodle Code Checker
        run: moodle-plugin-ci codechecker

      - name: Moodle PHPDoc Checker
        run: moodle-plugin-ci phpdoc

      - name: Validating
        run: moodle-plugin-ci validate

      - name: Check upgrade savepoints
        run: moodle-plugin-ci savepoints

      - name: Mustache Lint
        run: moodle-plugin-ci mustache

      - name: Grunt
        run: moodle-plugin-ci grunt

      - name: PHPUnit tests
        run: moodle-plugin-ci phpunit

      - name: Check db schema compatibility
        run: moodle-plugin-ci schemaspy
